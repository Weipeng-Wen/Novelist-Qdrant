<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>新建作品</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <style>
    .create-page {
      width: min(1080px, 92vw);
      margin: 0 auto;
      padding: 34px 0 64px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      gap: 12px;
    }

    .back-link {
      text-decoration: none;
      color: var(--accent);
      border: 1px solid rgba(255, 232, 199, 0.3);
      border-radius: 999px;
      padding: 8px 12px;
      background: rgba(255, 232, 199, 0.08);
    }

    .id-chip {
      border: 1px solid rgba(255, 232, 199, 0.35);
      border-radius: 999px;
      padding: 6px 12px;
      color: var(--text-main);
      background: rgba(255, 232, 199, 0.1);
      font-size: 13px;
      letter-spacing: 0.04em;
    }

    .panel {
      padding: 20px;
      border-radius: 14px;
      border: 1px solid rgba(255, 236, 213, 0.18);
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.25);
      margin-bottom: 16px;
    }

    .panel h1,
    .panel h2 {
      margin: 0 0 12px;
      color: var(--accent);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      font-size: 14px;
      color: var(--text-subtle);
    }

    input,
    textarea {
      width: 100%;
      border-radius: 10px;
      border: 1px solid rgba(255, 236, 213, 0.25);
      background: rgba(0, 0, 0, 0.18);
      color: var(--text-main);
      padding: 10px 12px;
      font: inherit;
      resize: vertical;
    }

    textarea { min-height: 96px; }

    #requirements {
      min-height: 160px;
      max-height: 280px;
      overflow: auto;
      resize: vertical;
    }

    #requirements::-webkit-scrollbar {
      width: 8px;
    }

    #requirements::-webkit-scrollbar-thumb {
      border-radius: 999px;
      background: rgba(255, 232, 199, 0.28);
    }

    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .btn {
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      color: #f8efe4;
      cursor: pointer;
      font-size: 14px;
      transition: transform 160ms ease, filter 160ms ease;
    }

    .btn:hover { transform: translateY(-1px); filter: brightness(1.08); }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }

    .btn-generate { background: linear-gradient(35deg, #1a4f5f, #2e7585); }
    .btn-save { background: linear-gradient(35deg, #6a5d30, #9f8740); }
    .btn-secondary { background: rgba(255, 255, 255, 0.14); border: 1px solid rgba(255, 255, 255, 0.22); }

    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      align-items: start;
    }

    .subpanel {
      border: 1px solid rgba(255, 236, 213, 0.16);
      border-radius: 10px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.03);
    }

    .list-stack {
      display: grid;
      gap: 10px;
      max-height: 360px;
      overflow: auto;
      padding-right: 6px;
    }

    .list-stack::-webkit-scrollbar {
      width: 8px;
    }

    .list-stack::-webkit-scrollbar-thumb {
      border-radius: 999px;
      background: rgba(255, 232, 199, 0.28);
    }

    .item {
      border: 1px solid rgba(255, 236, 213, 0.16);
      border-radius: 10px;
      padding: 10px;
      background: rgba(0, 0, 0, 0.14);
      display: grid;
      gap: 8px;
    }

    .item-head {
      font-size: 13px;
      color: var(--text-subtle);
    }

    .status {
      margin-top: 8px;
      min-height: 22px;
      color: var(--text-subtle);
      font-size: 14px;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.58);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 50;
      padding: 20px;
    }

    .overlay.show { display: flex; }

    .loading-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(7, 9, 8, 0.68);
      backdrop-filter: blur(2px);
      z-index: 70;
      padding: 20px;
    }

    .loading-overlay.show {
      display: flex;
    }

    .loading-card {
      width: min(420px, 90vw);
      border-radius: 14px;
      border: 1px solid rgba(255, 236, 213, 0.26);
      background: linear-gradient(170deg, #262118, #171917);
      box-shadow: 0 20px 34px rgba(0, 0, 0, 0.45);
      padding: 20px;
      display: grid;
      gap: 10px;
      justify-items: center;
      text-align: center;
    }

    .loading-spinner {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 3px solid rgba(255, 232, 199, 0.22);
      border-top-color: #ffd89d;
      animation: spin 900ms linear infinite;
    }

    .loading-title {
      color: var(--accent);
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .loading-subtitle {
      color: var(--text-subtle);
      font-size: 14px;
      line-height: 1.7;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .modal {
      width: min(520px, 94vw);
      border-radius: 14px;
      border: 1px solid rgba(255, 236, 213, 0.22);
      background: linear-gradient(170deg, #252019, #171917);
      box-shadow: 0 20px 34px rgba(0, 0, 0, 0.45);
      padding: 20px;
    }

    .modal h3 { margin: 0 0 8px; color: var(--accent); }
    .modal p { margin: 0; color: var(--text-subtle); line-height: 1.7; }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 16px;
    }

    .confetti-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 45;
    }

    .confetti {
      position: absolute;
      top: -12px;
      width: 10px;
      height: 16px;
      opacity: 0.95;
      animation: confetti-fall 2600ms linear forwards;
    }

    @keyframes confetti-fall {
      to {
        transform: translateY(110vh) rotate(620deg);
        opacity: 0.2;
      }
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid rgba(255, 232, 199, 0.28);
      background: rgba(20, 22, 20, 0.9);
      display: none;
      z-index: 60;
    }

    .toast.show { display: block; }

    @media (max-width: 940px) {
      .form-grid,
      .result-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="create-page">
    <div class="topbar">
      <a class="back-link" href="/">返回书架</a>
      <span id="novel-id-chip" class="id-chip">小说ID：生成中...</span>
    </div>

    <section class="panel">
      <h1>新建作品</h1>
      <div class="form-grid">
        <div class="field">
          <label for="writing-style">文风（必填）</label>
          <input id="writing-style" placeholder="例如：悬疑现实、古风群像、轻科幻" />
        </div>

        <div class="field full">
          <label for="requirements">新作要求（必填）</label>
          <textarea id="requirements" placeholder="例如：主角成长线清晰，前5章节奏快；每章结尾留钩子；前三章建立核心冲突。"></textarea>
        </div>
      </div>

      <div class="btn-row">
        <button id="generate-btn" class="btn btn-generate" type="button">生成新作内容</button>
        <button id="reset-btn" class="btn btn-secondary" type="button">重置草稿</button>
      </div>
      <div id="status" class="status"></div>
    </section>

    <section class="panel">
      <h2>生成结果（可微调）</h2>
      <div class="form-grid" style="margin-bottom: 12px;">
        <div class="field">
          <label for="novel-title">标题</label>
          <input id="novel-title" placeholder="生成后可手动修改" />
        </div>
        <div class="field full">
          <label for="novel-intro">简介</label>
          <textarea id="novel-intro" placeholder="生成后可手动修改"></textarea>
        </div>
      </div>

      <div class="result-grid">
        <div class="subpanel">
          <label>人物设定（可编辑）</label>
          <div id="character-list" class="list-stack"></div>
        </div>

        <div class="subpanel">
          <label>章节大纲（每章标题+摘要，可编辑）</label>
          <div id="chapter-list" class="list-stack"></div>
        </div>
      </div>

      <div class="btn-row" style="margin-top: 14px;">
        <button id="confirm-btn" class="btn btn-save" type="button" disabled>确定并保存</button>
      </div>
    </section>
  </main>

  <div id="generating-overlay" class="loading-overlay" aria-live="polite" aria-busy="true">
    <div class="loading-card">
      <span class="loading-spinner" aria-hidden="true"></span>
      <div class="loading-title">智能体正在创作中...</div>
      <div class="loading-subtitle">正在生成标题、人物设定和章节大纲，请稍候。</div>
    </div>
  </div>

  <div id="confirm-overlay" class="overlay" role="dialog" aria-modal="true" aria-labelledby="confirm-title">
    <div class="modal">
      <h3 id="confirm-title">确认保存这个新作品？</h3>
      <p>保存后会写入小说基础信息、人物设定与章节摘要数据，你可以随后在详情页继续完善正文。</p>
      <div class="modal-actions">
        <button id="cancel-save-btn" class="btn btn-secondary" type="button">再检查一下</button>
        <button id="do-save-btn" class="btn btn-save" type="button">确认保存</button>
      </div>
    </div>
  </div>

  <div id="confetti-layer" class="confetti-layer"></div>
  <div id="toast" class="toast"></div>

  <script>
    let novelId = null;
    let draft = null;

    const idChip = document.getElementById("novel-id-chip");
    const writingStyleInput = document.getElementById("writing-style");
    const requirementsInput = document.getElementById("requirements");
    const statusEl = document.getElementById("status");

    const titleInput = document.getElementById("novel-title");
    const introInput = document.getElementById("novel-intro");
    const characterList = document.getElementById("character-list");
    const chapterList = document.getElementById("chapter-list");

    const generateBtn = document.getElementById("generate-btn");
    const resetBtn = document.getElementById("reset-btn");
    const confirmBtn = document.getElementById("confirm-btn");

    const confirmOverlay = document.getElementById("confirm-overlay");
    const cancelSaveBtn = document.getElementById("cancel-save-btn");
    const doSaveBtn = document.getElementById("do-save-btn");

    const confettiLayer = document.getElementById("confetti-layer");
    const toast = document.getElementById("toast");
    const generatingOverlay = document.getElementById("generating-overlay");

    function showStatus(text, isError = false) {
      statusEl.textContent = text;
      statusEl.style.color = isError ? "#ff9f9f" : "var(--text-subtle)";
    }

    function showGeneratingOverlay() {
      generatingOverlay.classList.add("show");
    }

    function hideGeneratingOverlay() {
      generatingOverlay.classList.remove("show");
    }

    function showToast(text) {
      toast.textContent = text;
      toast.classList.add("show");
      window.setTimeout(() => toast.classList.remove("show"), 2400);
    }

    function playCelebration() {
      const colors = ["#ffd18a", "#9be7d8", "#ff8f7f", "#d6ff9a", "#fff2a8"];
      const count = 90;
      for (let i = 0; i < count; i += 1) {
        const confetti = document.createElement("span");
        confetti.className = "confetti";
        confetti.style.left = `${Math.random() * 100}%`;
        confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.transform = `translateY(-10px) rotate(${Math.random() * 360}deg)`;
        confetti.style.animationDuration = `${2100 + Math.random() * 1200}ms`;
        confetti.style.animationDelay = `${Math.random() * 240}ms`;
        confettiLayer.appendChild(confetti);
        window.setTimeout(() => confetti.remove(), 3600);
      }
    }

    async function initNovelId() {
      const resp = await fetch("/api/novels/new-id");
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();
      novelId = Number(data.novel_id);
      idChip.textContent = `小说ID：${novelId}`;
    }

    function renderCharacters(characters) {
      characterList.innerHTML = "";
      (characters || []).forEach((char, idx) => {
        const wrap = document.createElement("div");
        wrap.className = "item";
        wrap.innerHTML = `
          <div class="item-head">角色 ${idx + 1}</div>
          <input data-kind="character_name" data-index="${idx}" value="${(char.character_name || "").replace(/"/g, "&quot;")}" placeholder="角色名" />
          <textarea data-kind="profile_detail" data-index="${idx}" placeholder="人物设定">${char.profile_detail || ""}</textarea>
        `;
        characterList.appendChild(wrap);
      });
    }

    function renderChapters(chapters) {
      chapterList.innerHTML = "";
      (chapters || []).forEach((chapter, idx) => {
        const wrap = document.createElement("div");
        wrap.className = "item";
        wrap.innerHTML = `
          <div class="item-head">第 ${chapter.chapter_id || idx + 1} 章</div>
          <input data-kind="chapter_title" data-index="${idx}" value="${(chapter.title || "").replace(/"/g, "&quot;")}" placeholder="章节标题" />
          <textarea data-kind="chapter_summary" data-index="${idx}" placeholder="章节摘要">${chapter.summary || ""}</textarea>
        `;
        chapterList.appendChild(wrap);
      });
    }

    function collectEditableDraft() {
      if (!draft) return null;

      const updated = {
        novel_id: novelId,
        writing_style: writingStyleInput.value.trim(),
        title: titleInput.value.trim(),
        intro: introInput.value.trim(),
        characters: [],
        chapters: [],
      };

      const characterItems = characterList.querySelectorAll(".item");
      characterItems.forEach((item, idx) => {
        const name = item.querySelector('[data-kind="character_name"]').value.trim();
        const profile = item.querySelector('[data-kind="profile_detail"]').value.trim();
        updated.characters.push({
          character_id: idx + 1,
          character_name: name || `角色${idx + 1}`,
          profile_detail: profile || "待完善",
        });
      });

      const chapterItems = chapterList.querySelectorAll(".item");
      chapterItems.forEach((item, idx) => {
        const title = item.querySelector('[data-kind="chapter_title"]').value.trim();
        const summary = item.querySelector('[data-kind="chapter_summary"]').value.trim();
        updated.chapters.push({
          chapter_id: idx + 1,
          title: title || `第${idx + 1}章`,
          summary: summary || "待完善",
        });
      });

      return updated;
    }

    function resetDraftView() {
      draft = null;
      titleInput.value = "";
      introInput.value = "";
      characterList.innerHTML = "";
      chapterList.innerHTML = "";
      confirmBtn.disabled = true;
      showStatus("草稿已重置。请填写文风和新作要求后重新生成。");
    }

    async function generateDraft() {
      const writingStyle = writingStyleInput.value.trim();
      const requirements = requirementsInput.value.trim();
      if (!writingStyle || !requirements) {
        showStatus("请先填写文风和新作要求。", true);
        return;
      }

      if (!novelId) {
        showStatus("小说ID尚未初始化，请稍后重试。", true);
        return;
      }

      generateBtn.disabled = true;
      showStatus("占位Agent正在生成内容...");
      showGeneratingOverlay();

      try {
        const resp = await fetch("/api/agent/generate-draft", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            novel_id: novelId,
            writing_style: writingStyle,
            requirements,
          }),
        });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        draft = await resp.json();

        titleInput.value = draft.title || "";
        introInput.value = draft.intro || "";
        renderCharacters(draft.characters || []);
        renderChapters(draft.chapters || []);

        confirmBtn.disabled = false;
        showStatus("生成完成，你可以微调后点击“确定并保存”。");
      } catch (err) {
        console.error(err);
        showStatus("生成失败，请稍后重试。", true);
      } finally {
        generateBtn.disabled = false;
        hideGeneratingOverlay();
      }
    }

    async function saveDraft() {
      const payload = collectEditableDraft();
      if (!payload) {
        showStatus("请先生成草稿。", true);
        return;
      }
      if (!payload.writing_style || !payload.title) {
        showStatus("文风和标题不能为空。", true);
        return;
      }
      if (payload.characters.length === 0 || payload.chapters.length === 0) {
        showStatus("至少需要1个角色和1个章节。", true);
        return;
      }

      doSaveBtn.disabled = true;
      try {
        const resp = await fetch("/api/novels", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        if (!resp.ok) {
          const errData = await resp.json().catch(() => ({}));
          throw new Error(errData.detail || `HTTP ${resp.status}`);
        }

        confirmOverlay.classList.remove("show");
        playCelebration();
        showToast("新作保存成功，恭喜你开始新的创作旅程！");
        showStatus("已保存到数据库，即将跳转到详情页。", false);
        window.setTimeout(() => {
          window.location.href = `/detail/${encodeURIComponent(novelId)}`;
        }, 900);
      } catch (err) {
        console.error(err);
        showStatus(`保存失败：${err.message || err}`, true);
      } finally {
        doSaveBtn.disabled = false;
      }
    }

    generateBtn.addEventListener("click", generateDraft);
    resetBtn.addEventListener("click", resetDraftView);

    confirmBtn.addEventListener("click", () => {
      const payload = collectEditableDraft();
      if (!payload) {
        showStatus("请先生成草稿。", true);
        return;
      }
      confirmOverlay.classList.add("show");
    });

    cancelSaveBtn.addEventListener("click", () => {
      confirmOverlay.classList.remove("show");
    });

    confirmOverlay.addEventListener("click", (event) => {
      if (event.target === confirmOverlay) confirmOverlay.classList.remove("show");
    });

    doSaveBtn.addEventListener("click", saveDraft);

    (async function bootstrap() {
      try {
        await initNovelId();
        showStatus("请填写文风和新作要求，然后点击“生成新作内容”。");
      } catch (err) {
        console.error(err);
        showStatus("初始化小说ID失败，请刷新重试。", true);
      }
    })();
  </script>
</body>
</html>
